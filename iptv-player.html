<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamSports</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

header { width: 100%; max-width: 960px; padding: 1.5rem 0 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
header h1 { font-size: 1.1rem; font-weight: 600; color: #4caf50; letter-spacing: -0.5px; text-transform: uppercase; }
header .dot { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; }

.player-wrap { width: 100%; max-width: 960px; position: relative; background: #000; cursor: none; border-radius: 4px; overflow: hidden; }
.player-wrap:hover, .player-wrap.show-cursor { cursor: default; }

.player-wrap video { width: 100%; aspect-ratio: 16/9; display: block; pointer-events: none; }

/* Hover overlay */
.overlay { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.overlay.visible { opacity: 1; pointer-events: auto; }

/* Top gradient */
.top-gradient { position: absolute; top: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%); }

/* Center play button */
.center-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.4); color: #fff; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; padding-left: 4px; }
.center-play:hover { background: rgba(76,175,80,0.6); border-color: #4caf50; transform: translate(-50%, -50%) scale(1.05); }

/* Bottom controls */
.controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem 1.2rem 0.8rem; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); }

.progress-wrap { width: 100%; margin-bottom: 0.75rem; cursor: pointer; position: relative; height: 5px; }
.progress-track { width: 100%; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; overflow: hidden; }
.progress-fill { height: 100%; background: #4caf50; border-radius: 3px; transition: width 0.1s; width: 0%; position: relative; }
.progress-fill::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #4caf50; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
.progress-wrap:hover .progress-fill::after { opacity: 1; }
.progress-buffer { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255,255,255,0.1); border-radius: 3px; }

.controls-row { display: flex; align-items: center; gap: 1rem; }
.ctrl-btn { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.2s; }
.ctrl-btn:hover { color: #4caf50; }
.ctrl-btn.small { font-size: 1rem; }
.time { font-size: 0.8rem; color: #ccc; letter-spacing: 0.3px; }
.spacer { flex: 1; }
.volume-wrap { display: flex; align-items: center; gap: 0.5rem; }
.volume-slider { width: 0; overflow: hidden; transition: width 0.2s; }
.volume-wrap:hover .volume-slider { width: 80px; }
.volume-slider input { width: 80px; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
.volume-slider input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #4caf50; border-radius: 50%; cursor: pointer; }
.volume-slider input::-moz-range-thumb { width: 12px; height: 12px; background: #4caf50; border-radius: 50%; border: none; cursor: pointer; }

/* Ad overlay */
.ad-overlay { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 20; }
.ad-overlay.active { display: flex; }
.ad-overlay video { width: 100%; height: 100%; object-fit: contain; }
.ad-label { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.8); color: #4caf50; font-size: 0.7rem; padding: 4px 12px; border-radius: 3px; border: 1px solid #2e7d32; letter-spacing: 1px; text-transform: uppercase; }
.skip-btn { position: absolute; bottom: 80px; right: 20px; background: rgba(0,0,0,0.85); color: #fff; border: 1px solid #2e7d32; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; display: none; }
.skip-btn.show { display: block; }
.skip-btn:hover { background: #1b5e20; }
.ad-timer { position: absolute; bottom: 80px; left: 20px; background: rgba(0,0,0,0.8); color: #4caf50; font-size: 0.8rem; padding: 4px 12px; border-radius: 3px; border: 1px solid #2e7d32; }

.banner-ad { width: 100%; max-width: 960px; margin-top: 1rem; min-height: 90px; background: #0a0a0a; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #2e7d32; font-size: 0.75rem; border: 1px solid #111; overflow: hidden; }
.banner-ad ins.adsbygoogle { display: block; }

.status-bar { width: 100%; max-width: 960px; padding: 0.5rem 0; font-size: 0.75rem; color: #333; letter-spacing: 0.3px; }
.status-bar span { color: #4caf50; }
</style>
</head>
<body>

<header>
<span class="dot"></span>
<h1>StreamSports</h1>
</header>

<div class="player-wrap" id="playerWrap">
<div class="ad-overlay" id="adOverlay">
<span class="ad-label">Ad</span>
<video id="adVideo" muted playsinline></video>
<span class="ad-timer" id="adTimer"></span>
<button class="skip-btn" id="skipBtn">Skip Ad</button>
</div>

<video id="mainVideo" playsinline></video>

<div class="overlay" id="overlay">
<div class="top-gradient"></div>
<button class="center-play" id="centerPlay">▶</button>

<div class="controls">
<div class="progress-wrap" id="progressWrap">
<div class="progress-track">
<div class="progress-buffer" id="bufferBar"></div>
<div class="progress-fill" id="progressFill"></div>
</div>
</div>
<div class="controls-row">
<button class="ctrl-btn" id="playBtn">▶</button>
<button class="ctrl-btn small" id="volumeBtn">🔊</button>
<div class="volume-wrap">
<div class="volume-slider">
<input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
</div>
</div>
<span class="time" id="timeDisplay">0:00 / 0:00</span>
<div class="spacer"></div>
<button class="ctrl-btn" id="fullscreenBtn">⛶</button>
</div>
</div>
</div>
</div>

<div class="status-bar"><span>●</span> <span id="status">Ready</span></div>

<div class="banner-ad">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
data-ad-slot="xxxxxxxxxx"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
</div>

<script>
const STREAM_URL = 'https://d1jzu95oc8fgt3.cloudfront.net/FOX_Sports.m3u8';
const PREROLL_AD_URL = '';
const AD_DURATION = 15;
const SKIP_AFTER = 5;

const video = document.getElementById('mainVideo');
const wrap = document.getElementById('playerWrap');
const overlay = document.getElementById('overlay');
const centerPlay = document.getElementById('centerPlay');
const playBtn = document.getElementById('playBtn');
const progressFill = document.getElementById('progressFill');
const bufferBar = document.getElementById('bufferBar');
const progressWrap = document.getElementById('progressWrap');
const timeDisplay = document.getElementById('timeDisplay');
const volumeBtn = document.getElementById('volumeBtn');
const volumeSlider = document.getElementById('volumeSlider');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const statusEl = document.getElementById('status');
const adOverlay = document.getElementById('adOverlay');
const adVideo = document.getElementById('adVideo');
const adTimer = document.getElementById('adTimer');
const skipBtn = document.getElementById('skipBtn');

let hls = null;
let adInterval = null;
let isPlaying = false;
let hideTimer = null;

function fmt(t) { const m = Math.floor(t / 60); const s = Math.floor(t % 60); return `${m}:${String(s).padStart(2, '0')}`; }

function showOverlay() { overlay.classList.add('visible'); wrap.classList.add('show-cursor'); clearTimeout(hideTimer); hideTimer = setTimeout(() => { if (isPlaying) { overlay.classList.remove('visible'); wrap.classList.remove('show-cursor'); } }, 3000); }

wrap.addEventListener('mousemove', showOverlay);
wrap.addEventListener('click', (e) => { if (e.target === wrap || e.target.closest('video')) togglePlay(); });

function togglePlay() {
if (!isPlaying) {
if (hls || video.src) { video.play().then(() => { setPlaying(true); }).catch(() => {}); }
} else {
video.pause(); setPlaying(false);
}
}

function setPlaying(state) {
isPlaying = state;
playBtn.textContent = state ? '⏸' : '▶';
centerPlay.textContent = state ? '⏸' : '▶';
centerPlay.style.opacity = state ? '0' : '1';
if (!state) { overlay.classList.add('visible'); wrap.classList.add('show-cursor'); clearTimeout(hideTimer); }
}

centerPlay.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
playBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });

video.addEventListener('timeupdate', () => {
if (video.duration) {
progressFill.style.width = `${(video.currentTime / video.duration) * 100}%`;
timeDisplay.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
}
});

video.addEventListener('progress', () => {
if (video.buffered.length) {
const bufferedEnd = video.buffered.end(video.buffered.length - 1);
if (video.duration) bufferBar.style.width = `${(bufferedEnd / video.duration) * 100}%`;
}
});

progressWrap.addEventListener('click', (e) => {
if (!video.duration) return;
const rect = progressWrap.getBoundingClientRect();
const pct = (e.clientX - rect.left) / rect.width;
video.currentTime = pct * video.duration;
});

volumeSlider.addEventListener('input', () => { video.volume = volumeSlider.value; volumeBtn.textContent = video.volume === 0 ? '🔇' : video.volume < 0.5 ? '🔉' : '🔊'; });

fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); if (document.fullscreenElement) { document.exitFullscreen(); } else { wrap.requestFullscreen(); } });

function setStatus(msg) { statusEl.textContent = msg; }

function playPrerollAd() {
if (!PREROLL_AD_URL) { startMainStream(); return; }
setStatus('Ad');
video.pause();
adOverlay.classList.add('active');
adVideo.src = PREROLL_AD_URL;
adVideo.currentTime = 0;
let elapsed = 0;
skipBtn.classList.remove('show');
adTimer.textContent = `0:${String(AD_DURATION).padStart(2,'0')}`;
adVideo.play();
adInterval = setInterval(() => {
elapsed++;
const remaining = Math.max(0, AD_DURATION - elapsed);
adTimer.textContent = `0:${String(remaining).padStart(2,'0')}`;
if (elapsed >= SKIP_AFTER) skipBtn.classList.add('show');
if (elapsed >= AD_DURATION) finishAd();
}, 1000);
adVideo.addEventListener('ended', () => finishAd(), { once: true });
skipBtn.onclick = finishAd;
}

function finishAd() {
clearInterval(adInterval);
adOverlay.classList.remove('active');
adVideo.pause();
adVideo.src = '';
startMainStream();
}

function startMainStream() {
setStatus('Loading');
if (hls) { hls.destroy(); hls = null; }
video.removeAttribute('src');
if (Hls.isSupported()) {
hls = new Hls({ xhrSetup: (xhr) => xhr.withCredentials = false });
hls.loadSource(STREAM_URL);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, () => {
video.play().then(() => { setStatus('Live'); setPlaying(true); showOverlay(); }).catch(() => { setStatus('Click to play'); });
});
hls.on(Hls.Events.ERROR, (e, data) => {
if (data.fatal) { setStatus('Error'); setPlaying(false); }
});
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
video.src = STREAM_URL;
video.play().then(() => { setStatus('Live'); setPlaying(true); }).catch(() => {});
} else {
setStatus('HLS not supported');
}
}

window.addEventListener('load', () => { playPrerollAd(); });

try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
</script>
</body>
</html>
